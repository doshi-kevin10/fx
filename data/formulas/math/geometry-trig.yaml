- id: law-of-cosines
  name: Law of Cosines
  aliases: [cosine rule, generalized pythagorean theorem]
  domain: math
  subdomain: trigonometry
  tags: [triangle, angle, side length]
  latex: "c^{2} = a^{2} + b^{2} - 2ab\\cos C"
  description: >
    Relates the lengths of a triangle's sides to the cosine of one of its angles.
  source: https://en.wikipedia.org/wiki/Law_of_cosines

- id: law-of-sines
  name: Law of Sines
  aliases: [sine rule, sine law]
  domain: math
  subdomain: trigonometry
  tags: [triangle, angle, side length, circumradius]
  latex: "\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}"
  description: >
    The ratio of a triangle's side length to the sine of its opposite angle is constant.
  source: https://en.wikipedia.org/wiki/Law_of_sines

- id: pythagorean-trig-identity
  name: Pythagorean Trigonometric Identity
  aliases: [sin^2 + cos^2 = 1, fundamental trig identity]
  domain: math
  subdomain: trigonometry
  tags: [identity, sine, cosine]
  latex: "\\sin^{2}\\theta + \\cos^{2}\\theta = 1"
  description: >
    The fundamental relationship between sine and cosine of the same angle.
  source: https://en.wikipedia.org/wiki/Pythagorean_trigonometric_identity

- id: area-of-circle
