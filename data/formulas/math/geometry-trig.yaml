- id: distance-formula
  name: Distance Formula
  aliases: [euclidean distance, distance between two points]
  domain: math
  subdomain: geometry
  tags: [coordinates, euclidean, length]
  latex: "d = \\sqrt{(x_2 - x_1)^{2} + (y_2 - y_1)^{2}}"
  description: >
    Straight-line distance between two points in the Cartesian plane.
