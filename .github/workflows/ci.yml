name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast PR gate: schema + id-uniqueness + KaTeX render check, typecheck, tests.
  # No model download here so contributor PRs stay quick to verify.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Render-check every formula (the accuracy gate)
        run: npm run validate
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  # Full build including embeddings. Model weights are cached across runs.
  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache Hugging Face model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-minilm-l6-v2
      - run: npm ci
      - name: Build index.json + embeddings.json + library
        run: npm run build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/index.json
            dist/embeddings.json
            dist/lib
