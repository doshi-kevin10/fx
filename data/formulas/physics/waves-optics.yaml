# Physics — Waves & optics

- id: wave-speed
  name: Wave Speed
  aliases: [v = f lambda, wave equation, frequency wavelength]
  domain: physics
  subdomain: waves
  tags: [wave, frequency, wavelength, speed]
  latex: "v = f\\lambda"
  description: >
    Speed of a wave as the product of its frequency and wavelength.
  relation: "v = f * lambda"
  variables:
    - { key: v, symbol: "v", meaning: wave speed, unit: "m/s" }
    - { key: f, symbol: "f", meaning: frequency, unit: Hz }
    - { key: lambda, symbol: "\\lambda", meaning: wavelength, unit: m }
  source: https://en.wikipedia.org/wiki/Wavelength

- id: snells-law
  name: Snell's Law
  aliases: [law of refraction, snell law, refraction angles]
  domain: physics
  subdomain: optics
  tags: [refraction, light, index of refraction, angle]
  latex: "n_1 \\sin\\theta_1 = n_2 \\sin\\theta_2"
  description: >
    Relates the angles of incidence and refraction to the refractive indices of two media.
  relation: "n_1 * sin(theta_1) = n_2 * sin(theta_2)"
  variables:
    - { key: n_1, symbol: "n_1", meaning: refractive index of medium 1 }
    - { key: theta_1, symbol: "\\theta_1", meaning: angle of incidence, unit: rad }
    - { key: n_2, symbol: "n_2", meaning: refractive index of medium 2 }
    - { key: theta_2, symbol: "\\theta_2", meaning: angle of refraction, unit: rad }
  source: https://en.wikipedia.org/wiki/Snell%27s_law

- id: thin-lens-equation
  name: Thin Lens Equation
  aliases: [lens equation, focal length, object image distance]
  domain: physics
  subdomain: optics
  tags: [lens, focal length, optics, image]
  latex: "\\frac{1}{f} = \\frac{1}{d_o} + \\frac{1}{d_i}"
  description: >
    Relates the focal length of a thin lens to the object and image distances.
  relation: "1/f = 1/d_o + 1/d_i"
  variables:
    - { key: f, symbol: "f", meaning: focal length, unit: m }
    - { key: d_o, symbol: "d_o", meaning: object distance, unit: m }
    - { key: d_i, symbol: "d_i", meaning: image distance, unit: m }
  source: https://en.wikipedia.org/wiki/Lens

- id: doppler-effect
  name: Doppler Effect (Sound)
  aliases: [doppler shift, frequency shift, observed frequency]
  domain: physics
  subdomain: waves
  tags: [frequency, relative motion, sound, shift]
  latex: "f' = f\\,\\frac{v \\pm v_o}{v \\mp v_s}"
  description: >
    Observed frequency of a wave shifts with the relative motion of source and observer.
  source: https://en.wikipedia.org/wiki/Doppler_effect
