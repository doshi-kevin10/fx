# Math — Geometry & trigonometry

- id: pythagorean-theorem
  name: Pythagorean Theorem
  aliases: [pythagoras, a^2 + b^2 = c^2, right triangle theorem]
  domain: math
  subdomain: geometry
  tags: [triangle, right angle, hypotenuse, distance]
  latex: "a^{2} + b^{2} = c^{2}"
  description: >
    In a right triangle, the square of the hypotenuse equals the sum of squares of the legs.
  relation: "a^2 + b^2 = c^2"
  variables:
    - { key: a, symbol: "a", meaning: leg }
    - { key: b, symbol: "b", meaning: leg }
    - { key: c, symbol: "c", meaning: hypotenuse }
  source: https://en.wikipedia.org/wiki/Pythagorean_theorem

- id: law-of-cosines
  name: Law of Cosines
  aliases: [cosine rule, generalized pythagorean theorem]
  domain: math
  subdomain: trigonometry
  tags: [triangle, angle, side length]
  latex: "c^{2} = a^{2} + b^{2} - 2ab\\cos C"
  description: >
    Relates the lengths of a triangle's sides to the cosine of one of its angles.
  relation: "c^2 = a^2 + b^2 - 2*a*b*cos(C)"
  variables:
    - { key: c, symbol: "c", meaning: side opposite angle C }
    - { key: a, symbol: "a", meaning: side length }
    - { key: b, symbol: "b", meaning: side length }
    - { key: C, symbol: "C", meaning: angle between sides a and b }
  source: https://en.wikipedia.org/wiki/Law_of_cosines

- id: law-of-sines
  name: Law of Sines
  aliases: [sine rule, sine law]
  domain: math
  subdomain: trigonometry
  tags: [triangle, angle, side length, circumradius]
  latex: "\\frac{a}{\\sin A} = \\frac{b}{\\sin B} = \\frac{c}{\\sin C}"
  description: >
    The ratio of a triangle's side length to the sine of its opposite angle is constant.
  source: https://en.wikipedia.org/wiki/Law_of_sines

- id: pythagorean-trig-identity
  name: Pythagorean Trigonometric Identity
  aliases: [sin^2 + cos^2 = 1, fundamental trig identity]
  domain: math
  subdomain: trigonometry
  tags: [identity, sine, cosine]
  latex: "\\sin^{2}\\theta + \\cos^{2}\\theta = 1"
  description: >
    The fundamental relationship between sine and cosine of the same angle.
  source: https://en.wikipedia.org/wiki/Pythagorean_trigonometric_identity

- id: area-of-circle
  name: Area of a Circle
  aliases: [circle area, pi r squared]
  domain: math
  subdomain: geometry
  tags: [circle, area, radius]
  latex: "A = \\pi r^{2}"
  description: >
    Area enclosed by a circle of radius r.
  relation: "A = pi * r^2"
  variables:
    - { key: A, symbol: "A", meaning: area }
    - { key: r, symbol: "r", meaning: radius }
  source: https://en.wikipedia.org/wiki/Area_of_a_circle

- id: distance-formula
  name: Distance Formula
  aliases: [euclidean distance, distance between two points]
  domain: math
  subdomain: geometry
  tags: [coordinates, euclidean, length]
  latex: "d = \\sqrt{(x_2 - x_1)^{2} + (y_2 - y_1)^{2}}"
  description: >
    Straight-line distance between two points in the Cartesian plane.
  relation: "d = sqrt((x2 - x1)^2 + (y2 - y1)^2)"
  variables:
    - { key: d, symbol: "d", meaning: distance }
    - { key: x1, symbol: "x_1", meaning: x-coordinate of first point }
    - { key: y1, symbol: "y_1", meaning: y-coordinate of first point }
    - { key: x2, symbol: "x_2", meaning: x-coordinate of second point }
    - { key: y2, symbol: "y_2", meaning: y-coordinate of second point }
  source: https://en.wikipedia.org/wiki/Distance
