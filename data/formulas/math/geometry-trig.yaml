- id: pythagorean-theorem
  name: Pythagorean Theorem
  aliases: [pythagoras, a^2 + b^2 = c^2, right triangle theorem]
  domain: math
  subdomain: geometry
  tags: [triangle, right angle, hypotenuse, distance]
  latex: "a^{2} + b^{2} = c^{2}"
  description: >
    In a right triangle, the square of the hypotenuse equals the sum of squares of the legs.
  variables:
    - { symbol: "a", meaning: leg }
    - { symbol: "b", meaning: leg }
