- id: kinematic-velocity
  name: Kinematic Equation (Velocity)
  aliases: [v = u + at, SUVAT, equation of motion, first kinematic equation]
  domain: physics
  subdomain: mechanics
  tags: [kinematics, acceleration, velocity, motion, suvat]
  latex: "v = u + at"
  description: >
    Final velocity under constant acceleration, given initial velocity and elapsed time.
  relation: "v = u + a * t"
  variables:
    - { key: v, symbol: "v", meaning: final velocity, unit: "m/s" }
    - { key: u, symbol: "u", meaning: initial velocity, unit: "m/s" }
    - { key: a, symbol: "a", meaning: acceleration, unit: "m/s^2" }
    - { key: t, symbol: "t", meaning: time, unit: s }
  source: https://en.wikipedia.org/wiki/Equations_of_motion

- id: kinematic-displacement
  name: Kinematic Equation (Displacement)
  aliases: [s = ut + half a t squared, SUVAT displacement, second kinematic equation]
  domain: physics
  subdomain: mechanics
  tags: [kinematics, displacement, acceleration, motion, suvat]
  latex: "s = ut + \\tfrac{1}{2} a t^{2}"
  description: >
    Displacement under constant acceleration from initial velocity over time t.
  relation: "s = u * t + 0.5 * a * t^2"
  variables:
    - { key: s, symbol: "s", meaning: displacement, unit: m }
    - { key: u, symbol: "u", meaning: initial velocity, unit: "m/s" }
    - { key: a, symbol: "a", meaning: acceleration, unit: "m/s^2" }
    - { key: t, symbol: "t", meaning: time, unit: s }
  source: https://en.wikipedia.org/wiki/Equations_of_motion

- id: simple-pendulum-period
  name: Period of a Simple Pendulum
  aliases: [pendulum period, simple harmonic pendulum, swing period]
  domain: physics
  subdomain: mechanics
  tags: [oscillation, pendulum, period, simple harmonic motion]
  latex: "T = 2\\pi \\sqrt{\\frac{L}{g}}"
